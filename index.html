<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culture Buffs | Music</title>
    <style>
        /* --- STYLES (CSS) --- */
        :root {
            --bg-color: #f4f4f4; /* Paper color */
            --text-color: #1a1a1a; /* Ink color */
            --accent-color: #333;
            /* Main font for everything now (Sans-Serif) */
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            margin-bottom: 50px;
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 20px;
        }

        h1 {
            font-family: var(--font-main);
            font-weight: 700; 
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px; 
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 5px;
            display: block;
            font-weight: 600;
        }

        /* --- New Category Styles --- */
        .category {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            opacity: 0.8;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #d0d0d0;
        }

        /* Playlist List Styles */
        .playlist-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .playlist-item {
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.2s ease;
        }

        .playlist-item:last-child {
            border-bottom: none;
        }

        .playlist-item:hover {
            opacity: 0.6;
        }

        .playlist-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 500;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status.active {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* New status for texts/librettos */
        .status.read {
            background-color: #4a4a4a;
            color: var(--bg-color);
        }

        .status.soon {
            background-color: #e0e0e0;
            color: #888;
        }

        /* Footer with cross-link */
        footer {
            margin-top: 80px;
            text-align: center;
            opacity: 0.8;
        }

        .cross-link-text {
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: block;
        }

        .cross-link-btn {
            display: inline-block;
            padding: 12px 28px;
            border: 1px solid var(--text-color);
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .cross-link-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <span class="subtitle">Culture Buffs Organization</span>
            <h1>Music & Sound</h1>
        </header>

        <div class="category">
            <h2 class="category-title">Playlists & Curations</h2>
            <ul class="playlist-list">
                <li class="playlist-item">
                    <a href="modernist-fury.html" class="playlist-link">
                        <span>01. Modernist Fury</span>
                        <span class="status active">Listen</span>
                    </a>
                </li>
                <li class="playlist-item">
                    <div class="playlist-link" style="cursor: default;">
                        <span style="opacity: 0.4;">02. Coming Soon...</span>
                        <span class="status soon">Soon</span>
                    </div>
                </li>
            </ul>
        </div>

       <div class="category">
            <h2 class="category-title">Classical Opera</h2>
            <ul class="playlist-list">
                <li class="playlist-item">
                    <a href="carmen_libretto_ru/" class="playlist-link">
                        <span>Жорж Бизе: Кармен (Либретто, пер. А. Горчаковой)</span>
                        <span class="status read">Read</span>
                    </a>
                </li>
                <li class="playlist-item">
                    <div class="playlist-link" style="cursor: default;">
                        <span style="opacity: 0.4;">Ожидается...</span>
                        <span class="status soon">Soon</span>
                    </div>
                </li>
            </ul>
        </div>

        <footer>
            <span class="cross-link-text">Interested in literature and cinema?</span>
            <a href="https://culturebuffs.github.io/cinema-books/" class="cross-link-btn">
                Explore the Library →
            </a>
        </footer>
    </div>

</body>
</html>
